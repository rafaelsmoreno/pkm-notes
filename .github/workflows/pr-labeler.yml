name: PR Labeler
on:
  pull_request_target:
    types: [opened]

jobs:
  pr-labeler:
    runs-on: ubuntu-latest
    steps:
      - uses: TimonVS/pr-labeler-action@v3.1.0
        # Labeling is cosmetic — must not fail the pipeline.
        # The action errors when the source branch is deleted before it runs
        # (race between PR merge + branch delete and the queued event).
        continue-on-error: true
        with:
          # optional, .github/pr-labeler.yml is the default value
          configuration-path: .github/pr-labeler.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
